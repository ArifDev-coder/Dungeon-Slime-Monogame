name: CI/CD MonoGame

on:
  push:
    branches: [ "dev", "stable" ]
  pull_request:
    branches: [ "dev", "stable" ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0'
  PROJECT_PATH: 'Slime.csproj'  # ganti dengan nama project lo

jobs:
  build-windows:
    name: Windows Build
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Install MonoGame templates
        run: dotnet new install MonoGame.Templates.CSharp
      
      - name: Restore nuget packages
        run: dotnet restore
      
      - name: Build Windows
        run: dotnet build -c Release --no-restore
      
      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: DungeonSlime-Windows
          path: |
            bin/Release/net10.0-windows/
            !bin/Release/net10.0-windows/*.pdb
          retention-days: 14

  build-linux:
    name: Linux Build (Testing)
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Install MonoGame templates
        run: dotnet new install MonoGame.Templates.CSharp
      
      - name: Restore
        run: dotnet restore
      
      - name: Build Linux
        run: dotnet build -c Release --no-restore

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]
    if: always()
    
    steps:
      - name: All builds status
        run: |
          echo "✅ Windows Build: ${{ needs.build-windows.result }}"
          echo "✅ Linux Build: ${{ needs.build-linux.result }}"
