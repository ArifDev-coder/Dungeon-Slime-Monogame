name: Publish Dungeon Slime Game

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  DOTNET_VERSION: "10.0"

jobs:
  # ======================================================
  # BUILD UNTUK WINDOWS (Native)
  # ======================================================
  build-windows:
    name: Build & Package for Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install MonoGame templates
        run: dotnet new install MonoGame.Templates.CSharp

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish game for Windows (self-contained)
        run: |
          dotnet publish -c Release -r win-x64 -p:PublishReadyToRun=false -p:TieredCompilation=false --self-contained

      - name: Archive Windows build as ZIP
        run: |
          Compress-Archive -Path DungeonSlime/bin/Release/net10.0/win-x64/publish/ `
                           -DestinationPath DungeonSlime-Windows.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DungeonSlime-Windows
          path: DungeonSlime-Windows.zip
          retention-days: 14

  # ======================================================
  # BUILD UNTUK LINUX (Cross-compile dari Windows)
  # ======================================================
  build-linux:
    name: Build & Package for Linux (Cross-compile from Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install MonoGame templates
        run: dotnet new install MonoGame.Templates.CSharp

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish game for Linux (self-contained)
        run: |
          dotnet publish -c Release -r linux-x64 -p:PublishReadyToRun=false -p:TieredCompilation=false --self-contained
          
      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DungeonSlime-Linux
          path: DungeonSlime/bin/Release/net10.0/linux-x64/publish/ .
          retention-days: 14
