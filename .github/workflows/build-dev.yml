name: Publish Dungeon Slime Game

on:
  push:
    branches: [ "main" ]      # Jalan setiap ada push ke branch dev
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:         # Bisa dijalankan manual dari tab Actions

env:
  DOTNET_VERSION: '10.0'    
  PROJECT_PATH: 'Slime.csproj' # Ganti dengan path file .csproj Anda

jobs:
  # ======================================================
  # 1. BUILD UNTUK WINDOWS
  # ======================================================
  build-windows:
    name: Build & Package for Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install MonoGame templates
        run: dotnet new install MonoGame.Templates.CSharp

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish game for Windows (self-contained)
        run: |
          dotnet publish -c Release -r win-x64 -p:PublishReadyToRun=false -p:TieredCompilation=false --self-contained

      - name: Archive Windows build as ZIP
        run: |
          Compress-Archive -Path DungeonSlime/bin/Release/net10.0/win-x64/publish/ `
                           -DestinationPath DungeonSlime-Windows.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DungeonSlime-Windows
          path: DungeonSlime-Windows.zip
          retention-days: 14

  # ======================================================
  # 2. BUILD UNTUK LINUX (UBUNTU)
  # ======================================================
  build-linux:
    name: Build & Package for Linux (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install MonoGame templates
        run: dotnet new install MonoGame.Templates.CSharp

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish game for Linux (self-contained)
        run: |
          dotnet publish -c Release -r linux-x64 -p:PublishReadyToRun=false -p:TieredCompilation=false --self-contained

      - name: Archive Linux build as .tar.gz (preserves permissions)
        run: |
          tar -czvf DungeonSlime-Linux.tar.gz -C DungeonSlime/bin/Release/net10.0/linux-x64/publish/ .

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DungeonSlime-Linux
          path: DungeonSlime-Linux.tar.gz
          retention-days: 14
